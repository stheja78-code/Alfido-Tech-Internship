name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r TASK2-CICD-PIPELINE/requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          pytest TASK2-CICD-PIPELINE/test_app.py

      - name: Build Docker Image
        run: |
          docker build -t flask-app ./TASK2-CICD-PIPELINE