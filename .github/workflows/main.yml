name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t flask-app .

      - name: Run Container
        run: docker run -d -p 5000:5000 flask-app

      - name: Test Application
        run: curl http://localhost:5000